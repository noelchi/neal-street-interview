name: dev

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - import-existing
          - apply
          - configure

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'af-south-1' }}
  TF_IN_AUTOMATION: true
  TF_VERSION: 1.10.0
  TF_VAR_app_secret_value: ${{ secrets.DEV_APP_SECRET }}

jobs:
  plan:
    name: Plan dev
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || inputs.stage == 'plan'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Check app secret
        env:
          DEV_APP_SECRET: ${{ secrets.DEV_APP_SECRET }}
        run: test -n "$DEV_APP_SECRET"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -input=false -no-color -var-file=dev.tfvars.example -out=dev.tfplan

      - name: Install Ansible
        run: python -m pip install --upgrade ansible boto3 botocore

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Ansible syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check -i localhost, playbooks/site.yml

  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'apply'
    concurrency:
      group: rewards-dev-apply
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Check app secret
        env:
          DEV_APP_SECRET: ${{ secrets.DEV_APP_SECRET }}
        run: test -n "$DEV_APP_SECRET"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform apply dev
        working-directory: terraform
        run: terraform apply -input=false -auto-approve -var-file=dev.tfvars.example

  import-existing-dev:
    name: Import existing dev resources
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'import-existing'
    concurrency:
      group: rewards-dev-import
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Check app secret
        env:
          DEV_APP_SECRET: ${{ secrets.DEV_APP_SECRET }}
        run: test -n "$DEV_APP_SECRET"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Import existing dev resources
        working-directory: terraform
        run: |
          set -euo pipefail

          NAME="rewards-dev"
          REGION="${AWS_REGION}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          SSM_BUCKET="${NAME}-ansible-ssm-${ACCOUNT_ID}-${REGION}"
          SSM_POLICY_ARN="arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"

          is_missing() {
            [ -z "$1" ] || [ "$1" = "None" ] || [ "$1" = "null" ]
          }

          require_found() {
            local label="$1"
            local id="$2"

            if is_missing "$id"; then
              echo "Could not discover required existing resource: $label"
              exit 1
            fi
          }

          import_if_missing() {
            local address="$1"
            local id="$2"

            if is_missing "$id"; then
              echo "Skipping $address because no existing resource was found"
              return 0
            fi

            if terraform state show "$address" >/dev/null 2>&1; then
              local current_id
              current_id="$(terraform state show -no-color "$address" | awk -F' = ' '$1 ~ /^[[:space:]]*id$/ { print $2; exit }')"

              if [ "$current_id" = "$id" ]; then
                echo "$address already exists in Terraform state with expected ID"
              else
                echo "$address exists in Terraform state with ID $current_id, expected $id; re-importing"
                terraform state rm "$address"
                terraform import -input=false -var-file=dev.tfvars.example "$address" "$id"
              fi
            else
              terraform import -input=false -var-file=dev.tfvars.example "$address" "$id"
            fi
          }

          import_route_table_association() {
            local address="$1"
            local subnet_id="$2"
            local route_table_id="$3"

            if is_missing "$subnet_id" || is_missing "$route_table_id"; then
              echo "Skipping $address because no existing route table association was found"
              return 0
            fi

            if terraform state show "$address" >/dev/null 2>&1; then
              local current_subnet_id
              local current_route_table_id
              current_subnet_id="$(terraform state show -no-color "$address" | awk -F' = ' '$1 ~ /^[[:space:]]*subnet_id$/ { print $2; exit }')"
              current_route_table_id="$(terraform state show -no-color "$address" | awk -F' = ' '$1 ~ /^[[:space:]]*route_table_id$/ { print $2; exit }')"

              if [ "$current_subnet_id" = "$subnet_id" ] && [ "$current_route_table_id" = "$route_table_id" ]; then
                echo "$address already exists in Terraform state with expected subnet and route table"
              else
                echo "$address exists in Terraform state with subnet $current_subnet_id and route table $current_route_table_id; re-importing"
                terraform state rm "$address"
                terraform import -input=false -var-file=dev.tfvars.example "$address" "${subnet_id}/${route_table_id}"
              fi
            else
              terraform import -input=false -var-file=dev.tfvars.example "$address" "${subnet_id}/${route_table_id}"
            fi
          }

          ALB_ARN="$(aws elbv2 describe-load-balancers --names "$NAME" --query 'LoadBalancers[0].LoadBalancerArn' --output text)"
          TARGET_GROUP_ARN="$(aws elbv2 describe-target-groups --names "$NAME" --query 'TargetGroups[0].TargetGroupArn' --output text)"
          VPC_ID="$(aws elbv2 describe-target-groups --target-group-arns "$TARGET_GROUP_ARN" --query 'TargetGroups[0].VpcId' --output text)"
          ALB_SG_ID="$(aws elbv2 describe-load-balancers --load-balancer-arns "$ALB_ARN" --query 'LoadBalancers[0].SecurityGroups[0]' --output text)"

          require_found "ALB ARN" "$ALB_ARN"
          require_found "target group ARN" "$TARGET_GROUP_ARN"
          require_found "target group VPC ID" "$VPC_ID"
          require_found "ALB security group ID" "$ALB_SG_ID"

          IGW_ID="$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=${VPC_ID}" --query 'InternetGateways[0].InternetGatewayId' --output text)"
          PUBLIC_SUBNET_1="$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidr-block,Values=10.40.0.0/24" --query 'Subnets[0].SubnetId' --output text)"
          PUBLIC_SUBNET_2="$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidr-block,Values=10.40.1.0/24" --query 'Subnets[0].SubnetId' --output text)"
          PRIVATE_SUBNET_1="$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidr-block,Values=10.40.10.0/24" --query 'Subnets[0].SubnetId' --output text)"
          PRIVATE_SUBNET_2="$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" "Name=cidr-block,Values=10.40.11.0/24" --query 'Subnets[0].SubnetId' --output text)"
          PUBLIC_ROUTE_TABLE_ID="$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${NAME}-public" --query 'RouteTables[0].RouteTableId' --output text)"
          PRIVATE_ROUTE_TABLE_ID="$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=${VPC_ID}" "Name=tag:Name,Values=${NAME}-private" --query 'RouteTables[0].RouteTableId' --output text)"
          WEB_SG_ID="$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=${VPC_ID}" "Name=group-name,Values=${NAME}-web" --query 'SecurityGroups[0].GroupId' --output text)"
          VPCE_SG_ID="$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=${VPC_ID}" "Name=group-name,Values=${NAME}-vpce" --query 'SecurityGroups[0].GroupId' --output text)"
          SSM_VPCE_ID="$(aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=${VPC_ID}" "Name=service-name,Values=com.amazonaws.${REGION}.ssm" --query 'VpcEndpoints[0].VpcEndpointId' --output text)"
          SSM_MESSAGES_VPCE_ID="$(aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=${VPC_ID}" "Name=service-name,Values=com.amazonaws.${REGION}.ssmmessages" --query 'VpcEndpoints[0].VpcEndpointId' --output text)"
          EC2_MESSAGES_VPCE_ID="$(aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=${VPC_ID}" "Name=service-name,Values=com.amazonaws.${REGION}.ec2messages" --query 'VpcEndpoints[0].VpcEndpointId' --output text)"
          S3_VPCE_ID="$(aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=${VPC_ID}" "Name=service-name,Values=com.amazonaws.${REGION}.s3" --query 'VpcEndpoints[0].VpcEndpointId' --output text)"
          APP_SECRET_PARAMETER_NAME="$(aws ssm describe-parameters --parameter-filters Key=Name,Option=Equals,Values=/rewards/dev/APP_SECRET --query 'Parameters[0].Name' --output text)"
          LISTENER_ARN="$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query 'Listeners[?Port==`80`].ListenerArn | [0]' --output text)"
          LAUNCH_TEMPLATE_ID="$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "${NAME}-web" --query 'AutoScalingGroups[0].LaunchTemplate.LaunchTemplateId' --output text)"

          import_if_missing aws_vpc.this "$VPC_ID"
          import_if_missing aws_internet_gateway.this "$IGW_ID"
          import_if_missing 'aws_subnet.public[0]' "$PUBLIC_SUBNET_1"
          import_if_missing 'aws_subnet.public[1]' "$PUBLIC_SUBNET_2"
          import_if_missing 'aws_subnet.private[0]' "$PRIVATE_SUBNET_1"
          import_if_missing 'aws_subnet.private[1]' "$PRIVATE_SUBNET_2"
          import_if_missing aws_route_table.public "$PUBLIC_ROUTE_TABLE_ID"
          import_if_missing aws_route_table.private "$PRIVATE_ROUTE_TABLE_ID"
          import_route_table_association 'aws_route_table_association.public[0]' "$PUBLIC_SUBNET_1" "$PUBLIC_ROUTE_TABLE_ID"
          import_route_table_association 'aws_route_table_association.public[1]' "$PUBLIC_SUBNET_2" "$PUBLIC_ROUTE_TABLE_ID"
          import_route_table_association 'aws_route_table_association.private[0]' "$PRIVATE_SUBNET_1" "$PRIVATE_ROUTE_TABLE_ID"
          import_route_table_association 'aws_route_table_association.private[1]' "$PRIVATE_SUBNET_2" "$PRIVATE_ROUTE_TABLE_ID"
          import_if_missing aws_security_group.alb "$ALB_SG_ID"
          import_if_missing aws_security_group.web "$WEB_SG_ID"
          import_if_missing aws_security_group.vpce "$VPCE_SG_ID"
          import_if_missing 'aws_vpc_endpoint.ssm["ssm"]' "$SSM_VPCE_ID"
          import_if_missing 'aws_vpc_endpoint.ssm["ssmmessages"]' "$SSM_MESSAGES_VPCE_ID"
          import_if_missing 'aws_vpc_endpoint.ssm["ec2messages"]' "$EC2_MESSAGES_VPCE_ID"
          import_if_missing aws_vpc_endpoint.s3 "$S3_VPCE_ID"
          import_if_missing aws_s3_bucket.ansible_ssm "$SSM_BUCKET"
          import_if_missing aws_s3_bucket_public_access_block.ansible_ssm "$SSM_BUCKET"
          import_if_missing aws_s3_bucket_server_side_encryption_configuration.ansible_ssm "$SSM_BUCKET"
          import_if_missing aws_s3_bucket_lifecycle_configuration.ansible_ssm "$SSM_BUCKET"
          import_if_missing aws_iam_role.web "${NAME}-web"
          import_if_missing aws_iam_role_policy_attachment.ssm_managed_instance "${NAME}-web/${SSM_POLICY_ARN}"
          import_if_missing aws_iam_role_policy.app_secret "${NAME}-web:${NAME}-app-secret"
          import_if_missing aws_iam_instance_profile.web "${NAME}-web"
          import_if_missing aws_ssm_parameter.app_secret "$APP_SECRET_PARAMETER_NAME"
          import_if_missing aws_lb.web "$ALB_ARN"
          import_if_missing aws_lb_target_group.web "$TARGET_GROUP_ARN"
          import_if_missing aws_lb_listener.http "$LISTENER_ARN"
          import_if_missing aws_launch_template.web "$LAUNCH_TEMPLATE_ID"
          import_if_missing aws_autoscaling_group.web "${NAME}-web"
          import_if_missing aws_cloudwatch_metric_alarm.unhealthy_targets "${NAME}-unhealthy-targets"
          import_if_missing aws_cloudwatch_metric_alarm.high_cpu "${NAME}-high-cpu"

  configure-dev:
    name: Configure dev
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'configure'
    concurrency:
      group: rewards-dev-configure
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Capture Ansible SSM bucket
        id: tf-output
        working-directory: terraform
        run: echo "bucket=$(terraform output -raw ansible_ssm_bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        run: python -m pip install --upgrade ansible boto3 botocore

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure instances
        working-directory: ansible
        env:
          ANSIBLE_AWS_SSM_BUCKET_NAME: ${{ steps.tf-output.outputs.bucket }}
        run: ansible-playbook -i inventory.aws_ec2.yml playbooks/site.yml
