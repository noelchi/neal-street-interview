name: dev

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - import-existing
          - apply
          - configure

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'af-south-1' }}
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Plan dev
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || inputs.stage == 'plan'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terraform backend config
        working-directory: terraform
        run: cp backend.tf.example backend.tf

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -var-file=dev.tfvars.example -out=dev.tfplan

      - name: Install Ansible
        run: python -m pip install --upgrade ansible boto3 botocore

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Ansible syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check -i localhost, playbooks/site.yml

  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'apply'
    concurrency:
      group: rewards-dev-apply
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terraform backend config
        working-directory: terraform
        run: cp backend.tf.example backend.tf

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply dev
        working-directory: terraform
        run: terraform apply -auto-approve -var-file=dev.tfvars.example

  import-existing-dev:
    name: Import existing dev resources
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'import-existing'
    concurrency:
      group: rewards-dev-import
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terraform backend config
        working-directory: terraform
        run: cp backend.tf.example backend.tf

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Import existing dev resources
        working-directory: terraform
        run: |
          set -euo pipefail

          import_if_missing() {
            local address="$1"
            local id="$2"

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "$address already exists in Terraform state"
            else
              terraform import -var-file=dev.tfvars.example "$address" "$id"
            fi
          }

          ALB_ARN="$(aws elbv2 describe-load-balancers --names rewards-dev --query 'LoadBalancers[0].LoadBalancerArn' --output text)"
          TARGET_GROUP_ARN="$(aws elbv2 describe-target-groups --names rewards-dev --query 'TargetGroups[0].TargetGroupArn' --output text)"

          import_if_missing aws_s3_bucket.ansible_ssm rewards-dev-ansible-ssm-487750847994-af-south-1
          import_if_missing aws_iam_role.web rewards-dev-web
          import_if_missing aws_lb.web "$ALB_ARN"
          import_if_missing aws_lb_target_group.web "$TARGET_GROUP_ARN"

  configure-dev:
    name: Configure dev
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'configure'
    concurrency:
      group: rewards-dev-configure
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS role secret
        env:
          DEV_AWS_ROLE_ARN: ${{ secrets.DEV_AWS_ROLE_ARN }}
        run: test -n "$DEV_AWS_ROLE_ARN"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terraform backend config
        working-directory: terraform
        run: cp backend.tf.example backend.tf

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Capture Ansible SSM bucket
        id: tf-output
        working-directory: terraform
        run: echo "bucket=$(terraform output -raw ansible_ssm_bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Install Ansible
        run: python -m pip install --upgrade ansible boto3 botocore

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Configure instances
        working-directory: ansible
        env:
          ANSIBLE_AWS_SSM_BUCKET_NAME: ${{ steps.tf-output.outputs.bucket }}
        run: ansible-playbook -i inventory.aws_ec2.yml playbooks/site.yml
